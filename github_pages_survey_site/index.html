<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>대진대학교 외국인유학생 건강 설문지</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="shell">
    <header class="top">
      <div>
        <h1 id="appTitle"></h1>
        <p id="appSubtitle"></p>
      </div>
      <div class="controls">
        <label><span data-ui="language"></span><select id="languageSelect"></select></label>
        <label class="group-control"><span data-ui="participantGroup"></span><select id="groupSelect"></select></label>
      </div>
    </header>
    <div class="progress"><span id="progressLabel"></span><div><i id="progressBar"></i></div></div>
    <form id="surveyForm"></form>
    <section class="download-panel">
      <h2 data-ui="responses"></h2>
      <p id="responseCount"></p>
      <div class="actions">
        <button type="button" id="downloadCsv"></button>
        <button type="button" id="downloadJson"></button>
        <a id="downloadHtml" download="daejin_multilingual_health_survey.html"></a>
        <button type="button" id="clearResponses" class="danger"></button>
      </div>
    </section>
  </main>
  <script src="survey-data.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
